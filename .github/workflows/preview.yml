name: Preview Deploy

on:
  push:
    branches: ['AI-DEMO-*']

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build -- --base-href /crypto-terminal/preview/${{ github.ref_name }}/

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/crypto-terminal/browser
          destination_dir: preview/${{ github.ref_name }}
          keep_files: true
