name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build (main)
        if: github.ref_name == 'main'
        run: npm run build -- --base-href /crypto-terminal/

      - name: Build (preview)
        if: github.ref_name != 'main'
        run: npm run build -- --base-href /crypto-terminal/preview/${{ github.ref_name }}/

      - name: Deploy to root
        if: github.ref_name == 'main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/crypto-terminal/browser
          keep_files: true

      - name: Deploy to preview
        if: github.ref_name != 'main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/crypto-terminal/browser
          destination_dir: preview/${{ github.ref_name }}
          keep_files: true
